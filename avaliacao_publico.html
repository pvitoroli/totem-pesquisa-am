<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação - Pesquisa de Sentimento</title>
    
    <link rel="stylesheet" href="style-avaliacao.css">

    <style>
        body {
            background-color: #1b1e27;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        /* Ajuste do visual do botão Voltar */
        .btn-back {
            color: #a0a5b0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }
    
        /* STATUS ONLINE DISCRETO - RESTAURADO PARA AMARELO (#ffb703) */
        .pulse-dot-amarelo {
            width: 6px !important;
            height: 6px !important;
            background-color: #ffb703 !important; 
            border-radius: 50% !important;
            display: inline-block !important;
            animation: pulseAmarelo 1.5s infinite !important;
        }

        @keyframes pulseAmarelo {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 183, 3, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 5px rgba(255, 183, 3, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 183, 3, 0); }
        }

        /* =========================================
           NOVOS ESTILOS PROFISSIONAIS DOS BOTÕES DE NOTA 
           ========================================= */
        .rating-btn {
            background-color: #2a2f3a;
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            outline: none;
        }

        /* Efeito ao Passar o Mouse (Contorno Laranja) */
        .rating-btn:hover {
            border: 2px solid #ff3700;
            background-color: #2a2f3a;
            box-shadow: 0 0 12px rgba(255, 55, 0, 0.3);
            transform: scale(1.15);
        }

        /* Efeito ao Clicar (Preenchimento Laranja) */
        .rating-btn:active,
        .rating-btn:focus {
            background-color: #ff3700;
            border: 2px solid #ff3700;
            color: white;
            transform: scale(0.95);
            box-shadow: 0px 4px 15px rgba(255, 55, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="totem-app-canvas" style="width: 100%; max-width: 600px;">
      <div class="totem-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 12px; margin-bottom: 24px; height: 50px;">
       <div class="company-logo-area" style="display: flex; align-items: center; max-width: 140px; height: 100%;">
            <img src="logo-arcelormittal.png" alt="Logo ArcelorMittal" class="brand-logo-img" style="filter: brightness(1.2); max-width: 130px; max-height: 35px; width: 100%; height: auto; object-fit: contain;" />
       </div>
        <div class="header-right-text" style="display: flex;">
            <span class="brand-subtext" style="font-size: 11px; color: rgb(160, 165, 176); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;">PESQUISA DE SENTIMENTO - AMP</span>
        </div>
      </div>
      
      <div class="title-section" style="text-align: center; margin-bottom: 28px; display: flex; flex-direction: column; align-items: center;">
        <span class="campaign-mini-label" style="font-size: 11px; text-transform: uppercase; color: rgb(160, 165, 176); letter-spacing: 2px; font-weight: 700; margin-bottom: 2px;">Campanha Ativa</span>
        
        <h3 id="sub-evento-nome" style="text-align: center; color: rgb(255, 81, 0); font-weight: bold; position: relative; margin-top: 5px; margin-bottom: 5px;">CARREGANDO...</h3>
        
        <h5 style="text-align: center; font-size: 15px; color: #a0a5b0; font-family: Helvetica; margin-top: 25px; margin-bottom: 15px;">
          ​​<span style="font-weight: normal; color: white;">Deixe aqui sua <b>NOTA GERAL</b> para a campanha!</span>
        </h5>
        
        <div class="status-online-area" style="display: inline-flex; align-items: center; gap: 6px; background-color: rgba(255, 255, 255, 0.03); padding: 4px 10px; border-radius: 12px;">
            <span class="pulse-dot-amarelo"></span>
            <span class="status-text" style="font-size: 10px; color: rgb(160, 165, 176); font-weight: 600;">Conexão Totem Público</span>
        </div>
      </div>
        
      <div class="selected-sentiment-preview">
          <img id="emoji-preview" src="" alt="Emoji" class="emoji-preview-img" style="display: none;">
          <span id="label-sentimento-escolhido" class="preview-text-label">Carregando voto...</span>
      </div>
      
      <div class="rating-container" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px;">
        <div class="rating-row" style="display: flex; justify-content: center; gap: 8px;">
            <button onclick="enviarDados(0)" class="rating-btn">0</button>
            <button onclick="enviarDados(1)" class="rating-btn">1</button>
            <button onclick="enviarDados(2)" class="rating-btn">2</button>
            <button onclick="enviarDados(3)" class="rating-btn">3</button>
            <button onclick="enviarDados(4)" class="rating-btn">4</button>
            <button onclick="enviarDados(5)" class="rating-btn">5</button>
        </div>
        <div class="rating-row" style="display: flex; justify-content: center; gap: 8px;">
            <button onclick="enviarDados(6)" class="rating-btn">6</button>
            <button onclick="enviarDados(7)" class="rating-btn">7</button>
            <button onclick="enviarDados(8)" class="rating-btn">8</button>
            <button onclick="enviarDados(9)" class="rating-btn">9</button>
            <button onclick="enviarDados(10)" class="rating-btn">10</button>
        </div>
      </div>
      
      <div class="action-footer" style="margin-top: auto; display: flex; justify-content: flex-start;">
          <span id="link-voltar-dinamico"></span>
      </div>
    </div>

    <script>
        // 1. CAPTURA DOS PARÂMETROS DA URL
        const urlParams = new URLSearchParams(window.location.search);
        const evento = urlParams.get('evento') || "";
        const id = urlParams.get('id') || "";
        const sentimento = urlParams.get('sentimento') || "Geral";
        const gif = urlParams.get('gif') || ""; // 🔥 CAPTURA O GIF VINDO DA URL
        const setor = urlParams.get('setor') || "Geral";
        const proposta = urlParams.get('proposta') || "Geral";
        
        const chaveBloqueio = proposta !== "Geral" ? 'votou_' + id + '_' + proposta : 'votou_' + id;

        // 2. CERCA ELÉTRICA (BLOQUEIO ANTI-F5/VOLTAR)
        function checarBloqueio() {
            if (id && localStorage.getItem(chaveBloqueio) === 'sim') {
                document.body.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; text-align:center; padding: 20px; background-color: #1b1e27;">
                        <h1 style="font-size:50px; margin-bottom:10px;">✅</h1>
                        <h2 style="color:white; font-family:'Segoe UI', sans-serif;">Sentimento Registrado!</h2>
                        <p style="color:#a0a5b0; font-family:'Segoe UI', sans-serif; max-width: 400px; line-height: 1.5;">Sua participação nesta campanha já foi contabilizada de forma segura. Muito obrigado!</p>
                    </div>`;
                throw new Error("Acesso Bloqueado: Usuário já votou.");
            }
        }
        
        checarBloqueio(); 
        window.addEventListener('pageshow', checarBloqueio); 

        // 3. DICIONÁRIO DE FALLBACK (USADO SÓ SE O LINK DA URL VIER VAZIO)
        const linksEmojis = {
            "Aprendi algo novo": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f632/512.gif",
            "Fiquei feliz": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f601/512.gif",
            "Quero saber mais": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f9d0/512.gif",
            "Poderia ser melhor": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f614/512.gif"
        };

        // 4. PREENCHIMENTO DA TELA
        document.getElementById('sub-evento-nome').innerText = evento;
        document.getElementById('label-sentimento-escolhido').innerText = sentimento;
        
        document.getElementById('link-voltar-dinamico').innerHTML = `<a href="publico.html?evento=${encodeURIComponent(id)}&setor=${encodeURIComponent(setor)}&proposta=${encodeURIComponent(proposta)}" class="btn-back">← Voltar</a>`;

        const imgEmoji = document.getElementById('emoji-preview');
        
        // USA O GIF PASSADO NA URL OU RECORRE AO DICIONÁRIO PADRÃO
        const urlGifFinal = gif || linksEmojis[sentimento];
        if (urlGifFinal) {
            imgEmoji.src = urlGifFinal;
            imgEmoji.style.display = 'block'; 
        }

        // 5. FUNÇÃO DE ENVIO - SEM FETCH! (Apenas roteamento)
        function enviarDados(nota) {
            document.querySelectorAll('.rating-btn').forEach(b => b.style.pointerEvents = 'none');
            
            event.target.innerText = "...";
            event.target.style.backgroundColor = "#ff3700";
            event.target.style.borderColor = "#ff3700";
            event.target.style.color = "white";

            const linkDestino = `agradecimento_publico.html?evento=${encodeURIComponent(evento)}&id=${encodeURIComponent(id)}&sentimento=${encodeURIComponent(sentimento)}&setor=${encodeURIComponent(setor)}&nota=${nota}&proposta=${encodeURIComponent(proposta)}`;
            
            window.location.replace(linkDestino);
        }
        
        window.history.replaceState(null, null, window.location.href);
        window.onpopstate = function () { window.history.go(1); };
    </script>
</body>
</html>
