<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação - Pesquisa Pública</title>
    
    <link rel="stylesheet" href="style-publico.css">

    <style>
        body {
            background-color: #1b1e27; margin: 0; padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        
        .totem-app-canvas { width: 100%; max-width: 600px; }
        .logo-img { max-width: 130px; margin-bottom: 30px; filter: brightness(1.2); }
        h3 { color: #f39c12; margin: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        h2 { color: white; margin-top: 10px; font-size: 22px; font-weight: 800; }
        p { color: #a0a5b0; margin-bottom: 40px; font-size: 14px; }
        
        .nps-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .nps-btn {
            background: #2a2f3a; color: white; border: 1.5px solid rgba(255,255,255,0.05);
            border-radius: 12px; width: 55px; height: 55px; font-size: 20px; font-weight: bold;
            cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .nps-btn:hover { transform: scale(1.1); }
        .nps-red:hover { background: #e74c3c; border-color: #e74c3c; }
        .nps-yellow:hover { background: #f1c40f; border-color: #f1c40f; }
        .nps-green:hover { background: #2ecc71; border-color: #2ecc71; }
    </style>
</head>
<body>

    <div class="totem-app-canvas">
        <div class="totem-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 12px; margin-bottom: 24px; height: 50px;">
            <div class="company-logo-area" style="display: flex; align-items: center; max-width: 140px; height: 100%;">
                <img src="logo-arcelormittal.png" alt="Logo ArcelorMittal" class="logo-img" onerror="this.style.display='none'"/>
            </div>
            <div class="header-right-text">
                <span class="brand-subtext" style="font-size: 11px; color: rgb(160, 165, 176); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;">PESQUISA DE SENTIMENTO - AMP</span>
            </div>
        </div>
      
        <div class="title-section" style="text-align: center; margin-bottom: 28px;">
            <span style="font-size: 11px; text-transform: uppercase; color: rgb(160, 165, 176); letter-spacing: 2px; font-weight: 700;">Campanha Ativa</span>
            <h3 id="nome-campanha-ativa" style="color: rgb(243, 156, 18); margin: 5px 0;">CARREGANDO...</h3>
            <h5 style="color: white; font-weight: normal; margin-top: 25px;">Deixe aqui sua <b>NOTA GERAL</b> para a campanha!</h5>
        </div>
      
        <div class="nps-grid">
            <button class="nps-btn nps-red" onclick="enviarDadosPublicos(0)">0</button>
            <button class="nps-btn nps-red" onclick="enviarDadosPublicos(1)">1</button>
            <button class="nps-btn nps-red" onclick="enviarDadosPublicos(2)">2</button>
            <button class="nps-btn nps-red" onclick="enviarDadosPublicos(3)">3</button>
            <button class="nps-btn nps-red" onclick="enviarDadosPublicos(4)">4</button>
            <button class="nps-btn nps-red" onclick="enviarDadosPublicos(5)">5</button>
            <button class="nps-btn nps-red" onclick="enviarDadosPublicos(6)">6</button>
            <button class="nps-btn nps-yellow" onclick="enviarDadosPublicos(7)">7</button>
            <button class="nps-btn nps-yellow" onclick="enviarDadosPublicos(8)">8</button>
            <button class="nps-btn nps-green" onclick="enviarDadosPublicos(9)">9</button>
            <button class="nps-btn nps-green" onclick="enviarDadosPublicos(10)">10</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const evento = urlParams.get('evento') || "Ação Corporativa";
        const id = urlParams.get('id') || "";
        const sentimento = urlParams.get('sentimento') || "Geral";
        const setor = urlParams.get('setor') || "Geral";

        // Exibe o nome da campanha
        document.getElementById('nome-campanha-ativa').innerText = evento;

        function enviarDadosPublicos(nota) {
            // Trava botões
            document.querySelectorAll('.nps-btn').forEach(b => b.style.pointerEvents = 'none');
            
            // Redireciona para o agradecimento PÚBLICO levando a NOTA e o MODO
            window.location.replace(`agradecimento_publico.html?evento=${encodeURIComponent(evento)}&id=${id}&sentimento=${encodeURIComponent(sentimento)}&setor=${encodeURIComponent(setor)}&nota=${nota}&modo=publico`);
        }
    </script>
</body>
</html>
