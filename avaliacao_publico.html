<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação - Pesquisa de Sentimento</title>
    
    <link rel="stylesheet" href="style-avaliacao.css">

    <style>
        body {
            background-color: #1b1e27;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        /* Ajuste do visual do botão Voltar */
        .btn-back {
            color: #a0a5b0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>
<body>

    <div class="totem-app-canvas" style="width: 100%; max-width: 600px;">
      <div class="totem-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 12px; margin-bottom: 24px; height: 50px;">
       <div class="company-logo-area" style="display: flex; align-items: center; max-width: 140px; height: 100%;">
    <img src="logo-arcelormittal.png" alt="Logo ArcelorMittal" class="brand-logo-img" style="filter: brightness(1.2); max-width: 130px; max-height: 35px; width: 100%; height: auto; object-fit: contain;" />
</div>
        <div class="header-right-text" style="display: flex;">
            <span class="brand-subtext" style="font-size: 11px; color: rgb(160, 165, 176); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;">PESQUISA DE SENTIMENTO - AMP</span>
        </div>
      </div>
      
      <div class="title-section" style="text-align: center; margin-bottom: 28px; display: flex; flex-direction: column; align-items: center;">
        <span class="campaign-mini-label" style="font-size: 11px; text-transform: uppercase; color: rgb(160, 165, 176); letter-spacing: 2px; font-weight: 700; margin-bottom: 2px;">Campanha Ativa</span>
        
        <h3 id="sub-evento-nome" style="text-align: center; color: rgb(255, 81, 0); font-weight: bold; position: relative; margin-top: 5px; margin-bottom: 5px;">CARREGANDO...</h3>
        
        <h5 style="text-align: center; font-size: 15px; color: #a0a5b0; font-family: Helvetica; margin-top: 25px; margin-bottom: 15px;">
          ​​<span style="font-weight: normal; color: white;">Deixe aqui sua <b>NOTA GERAL</b> para a campanha!</span>
        </h5>
        
        <div class="status-online-area" style="display: inline-flex; align-items: center; gap: 6px; background-color: rgba(255, 255, 255, 0.03); padding: 4px 10px; border-radius: 12px;">
            <span class="pulse-dot" style="width: 6px; height: 6px; background-color: #ffb703; border-radius: 50%; box-shadow: rgba(255, 183, 3, 0.7) 0px 0px 0px 0px; animation: pulse 1.5s infinite;"></span>
            <span class="status-text" style="font-size: 10px; color: rgb(160, 165, 176); font-weight: 600;">Conexão Totem Público</span>
        </div>
      </div>
        
      <div class="selected-sentiment-preview">
          <img id="emoji-preview" src="" alt="Emoji" class="emoji-preview-img" style="display: none;">
          <span id="label-sentimento-escolhido" class="preview-text-label">Carregando voto...</span>
      </div>
      
      <div class="rating-container" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px;">
        <div class="rating-row" style="display: flex; justify-content: center; gap: 8px;">
            <button onclick="enviarDados(0)" class="rating-btn" style="background-color: #2a2f3a; border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer;">0</button>
            <button onclick="enviarDados(1)" class="rating-btn" style="background-color: #2a2f3a; border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer;">1</button>
            <button onclick="enviarDados(2)" class="rating-btn" style="background-color: #2a2f3a; border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer;">2</button>
            <button onclick="enviarDados(3)" class="rating-btn" style="background-color: #2a2f3a; border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer;">3</button>
            <button onclick="enviarDados(4)" class="rating-btn" style="background-color: #2a2f3a; border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer;">4</button>
            <button onclick="enviarDados(5)" class="rating-btn" style="background-color: #2a2f3a; border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer;">5</button>
        </div>
        <div class="rating-row" style="display: flex; justify-content: center; gap: 8px;">
            <button onclick="enviarDados(6)" class="rating-btn" style="background-color: #2a2f3a; border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer;">6</button>
            <button onclick="enviarDados(7)" class="rating-btn" style="background-color: #2a2f3a; border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer;">7</button>
            <button onclick="enviarDados(8)" class="rating-btn" style="background-color: #2a2f3a; border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer;">8</button>
            <button onclick="enviarDados(9)" class="rating-btn" style="background-color: #2a2f3a; border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer;">9</button>
            <button onclick="enviarDados(10)" class="rating-btn" style="background-color: #ff3700; border: 1px solid #ff3700; color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0px 4px 15px rgba(255, 55, 0, 0.4);">10</button>
        </div>
      </div>
      
      <div class="action-footer" style="margin-top: auto; display: flex; justify-content: flex-start;">
          <span id="link-voltar-dinamico"></span>
      </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const evento = urlParams.get('evento') || "";
        const id = urlParams.get('id') || "";
        const sentimento = urlParams.get('sentimento') || "Geral";
        const setor = urlParams.get('setor') || "Geral";

        // DICIONÁRIO DE EMOJIS ANIMADOS DO GOOGLE
        const linksEmojis = {
            "Aprendi algo novo": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f632/512.gif",
            "Fiquei feliz": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f601/512.gif",
            "Quero saber mais": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f9d0/512.gif",
            "Poderia ser melhor": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f614/512.gif"
        };

        // Preenche o Titulo
        document.getElementById('sub-evento-nome').innerText = evento;
        
        // Preenche o nome do sentimento
        document.getElementById('label-sentimento-escolhido').innerText = sentimento;

        // Injeta a imagem animada correspondente, se ela existir no dicionário
        const imgEmoji = document.getElementById('emoji-preview');
        if (linksEmojis[sentimento]) {
            imgEmoji.src = linksEmojis[sentimento];
            imgEmoji.style.display = 'block'; // Mostra a imagem
        }

        // 3. Configura o botão voltar mantendo as credenciais da campanha
        document.getElementById('link-voltar-dinamico').innerHTML = `<a href="index.html?evento=${id}&setor=${encodeURIComponent(setor)}" class="btn-back">← Voltar</a>`;

        // 4. Grava tudo no Sheets coletando Setor e Origem
        function enviarDados(nota) {
            const urlWebhook = "https://script.google.com/macros/s/AKfycbzJOLquqH2vlrywz83CAV5hEHUqmGc-VDqacyqxZVWl9uGqpt4NabKcK4HpvpmCMAeT/exec";
            
            event.target.innerText = "...";
            event.target.style.backgroundColor = "#ff3700";

            // Envia o pacote com os novos campos auditáveis
            fetch(urlWebhook, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify({
                    "evento": evento,
                    "sentimento": sentimento,
                    "nota": nota,
                    "setor": setor,       // Registra o setor no Totem Fixo
                    "origem": "Totem Fixo" // Registra a origem do dispositivo
                })
            }).then(() => {
                // Redireciona para o agradecimento REPASSANDO o ID e o Setor para o loop não quebrar!
                window.location.href = `agradecimento.html?id=${id}&setor=${encodeURIComponent(setor)}`;
            }).catch((erro) => {
                console.error("Erro ao gravar:", erro);
                window.location.href = `agradecimento.html?id=${id}&setor=${encodeURIComponent(setor)}`;
            });
        }
    </script>
