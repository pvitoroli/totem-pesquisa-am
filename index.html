<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Sentimento - AMP</title>
    
    <link rel="stylesheet" href="style-index.css">

    <style>
        body {
            background-color: #1b1e27;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <div class="totem-app-canvas" style="width: 100%; max-width: 600px;">
      <div class="totem-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 12px; margin-bottom: 24px; height: 50px;">
        <div class="company-logo-area" style="display: flex; align-items: center; max-width: 140px; height: 100%;">
            <img src="AMLogoWhiteRGB 3.png" alt="Logo" class="brand-logo-img" style="filter: brightness(1.2); max-width: 130px; max-height: 35px; width: 100%; object-fit: contain;" />
        </div>
        <div class="header-right-text" style="display: flex;">
            <span class="brand-subtext" style="font-size: 11px; color: rgb(160, 165, 176); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;">PESQUISA DE SENTIMENTO - AMP</span>
        </div>
      </div>
      
      <div class="title-section" style="text-align: center; margin-bottom: 28px; display: flex; flex-direction: column; align-items: center;">
        <span class="campaign-mini-label" style="font-size: 11px; text-transform: uppercase; color: rgb(160, 165, 176); letter-spacing: 2px; font-weight: 700; margin-bottom: 2px;">Campanha Ativa</span>
        <h3 id="nome-campanha-ativa" style="text-align: center; color: var(--portalThemeColor1); font-weight: bold; position: relative;">CARREGANDO...</h3>
        <h5 style="text-align: center; font-size: 15px; color: var(--portalThemeColor11); font-family: Helvetica;">
          ​​<span style="font-weight: normal; color: white;">O que você <b>SENTIU </b>no evento ou ação de hoje?</span>
        </h5>
        
        <div class="status-online-area" style="display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; background-color: rgba(255, 255, 255, 0.03); padding: 4px 10px; border-radius: 12px;">
            <span class="pulse-dot" style="width: 6px; height: 6px; background-color: #4bb543; border-radius: 50%; box-shadow: rgba(75, 181, 67, 0.7) 0px 0px 0px 0px; animation: pulse 1.5s infinite;"></span>
            <span class="status-text" style="font-size: 10px; color: rgb(160, 165, 176); font-weight: 600;">Conexão Totem Virtual</span>
        </div>
      </div>

      <div class="voting-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%;">
        <a href="#" onclick="escolherSentimento('Aprendi algo novo')" class="vote-card border-orange" style="...">...</a>
        </div>
    </div>

    <script>
        // LÓGICA DE CARREGAMENTO DINÂMICO
        window.onload = async function() {
            // URL do seu Google Apps Script (Configurado para GET)
            const urlWebhook = "SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI";
            
            try {
                const response = await fetch(urlWebhook + "?acao=buscarAtivo");
                const data = await response.json();
                
                if (data.nome) {
                    document.getElementById('nome-campanha-ativa').innerText = data.nome;
                    window.idEventoAtual = data.id; // Guarda o ID para enviar depois
                }
            } catch (error) {
                console.error("Erro ao buscar evento:", error);
                document.getElementById('nome-campanha-ativa').innerText = "Ação ArcelorMittal";
            }
        };

        function escolherSentimento(sentimento) {
            const evento = document.getElementById('nome-campanha-ativa').innerText;
            window.location.href = `avaliacao.html?evento=${encodeURIComponent(evento)}&sentimento=${encodeURIComponent(sentimento)}`;
        }
    </script>
</body>
</html>
