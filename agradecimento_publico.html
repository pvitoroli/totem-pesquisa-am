<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso - Pesquisa de Sentimento</title>
    
    <link rel="stylesheet" href="style-agradecimento.css">

    <style>
        body {
            background-color: #1b1e27;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Evita rolagens indesejadas no celular */
        }
        
        /* 1. Animação de entrada suave da caixa toda (Fade In Up) */
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 2. Animação de pop do ícone */
        .success-check-icon {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.2s;
            opacity: 0;
            transform: scale(0);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 3. Efeito Glow (Neon pulsante AMARELO) no círculo */
        .glow-pulse-yellow {
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
            animation: pulseGlowYellow 2s infinite alternate;
            background-color: rgba(243, 156, 18, 0.1);
        }

        @keyframes pulseGlowYellow {
            from { box-shadow: 0 0 15px rgba(243, 156, 18, 0.2); }
            to { box-shadow: 0 0 35px rgba(243, 156, 18, 0.6); }
        }

        /* Estilo do botão fechar */
        .btn-fechar {
            background: rgba(255, 255, 255, 0.05);
            color: #a0a5b0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
            margin-top: 15px;
        }
        .btn-fechar:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>
<body>

    <div class="totem-app-canvas animate-fade-in-up" style="width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 70vh;">
      
      <div class="success-box">
        <div class="success-icon-wrapper glow-pulse-yellow" style="width: 90px; height: 90px; margin: 0 auto 24px auto; border-radius: 50%; padding: 15px; display: flex; align-items: center; justify-content: center;">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgb(243, 156, 18)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="success-check-icon" style="width: 100%; height: 100%;">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
        </div>
        
        <h2 class="success-title" style="font-size: 26px; font-weight: 800; margin-bottom: 8px; color: white;">SENTIMENTO REGISTRADO!</h2>
        
        <h5 style="color: #a0a5b0; font-family: Helvetica; font-size: 16px; font-weight: normal; margin-top: 0;">
          Muito obrigado por participar.<br>Sua voz molda o nosso futuro!
        </h5>
        
        <div style="margin-top: 40px; padding: 20px; border-radius: 12px; background-color: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);">
            <p style="color: rgba(255,255,255,0.6); font-size: 13px; margin: 0 0 15px 0;">
                Sua resposta foi salva de forma anônima e segura. Você já pode sair desta tela.
            </p>
            <button class="btn-fechar" onclick="window.close()">Fechar Página</button>
        </div>
      </div>

    </div>

    <script>
        const URL_BACKEND = "https://script.google.com/macros/s/AKfycbwuxwABRXCV3juwoRT1KXZ58gYVSxTueqMuu3Dn1Q9JA2ypyWQv0klh3yCpA3UakU7q/exec";

        // 1. CAPTURA OS DADOS DA URL (Incluindo a nota numérica escolhida)
        const urlParams = new URLSearchParams(window.location.search);
        const nomeEvento = urlParams.get('evento');
        const idEvento = urlParams.get('id');
        const sentimento = urlParams.get('sentimento');
        const setor = urlParams.get('setor') || "Geral";
        const notaReal = urlParams.get('nota') || "10"; // Pega a nota clicada de 0 a 10

        // 2. BLOQUEIO IMEDIATO SE JÁ SE PASSOU POR AQUI (Anti-F5 / Anti-Reload)
        if (idEvento && localStorage.getItem('votou_' + idEvento) === 'sim') {
            document.body.innerHTML = `
                <div style="background-color:#1b1e27; color:white; font-family:sans-serif; text-align:center; padding:50px; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                    <h2 style="color:#ff5f00;">⚠️ VOTO JÁ REGISTRADO</h2>
                    <p style="color:#a0a5b0; max-width:400px;">Identificamos que uma participação já foi contabilizada para este dispositivo nesta campanha.</p>
                </div>
            `;
            throw new Error("Fluxo interrompido: Voto já computado neste dispositivo.");
        }

        // 3. TRAVA DO BOTÃO VOLTAR DO NAVEGADOR
        window.history.replaceState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.go(1);
        };

        // 4. REGISTRO DO VOTO REAL NA PLANILHA
        async function gravarVotoPublico() {
            if (!nomeEvento || !sentimento) return;

            // "Tautua" o dispositivo na memória antes do envio para blindar o fluxo
            if (idEvento) {
                localStorage.setItem('votou_' + idEvento, 'sim');
            }

            // Envia exatamente os eixos auditáveis coletados no Totem Público
            const payload = {
                "evento": nomeEvento,
                "sentimento": sentimento,
                "nota": parseInt(notaReal), // Envia a nota real (0 a 10) que o colaborador clicou
                "setor": setor,
                "origem": "Totem Público"
            };

            try {
                await fetch(URL_BACKEND, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                console.log("Voto público integrado com sucesso.");
            } catch (e) {
                console.error("Voto processado.");
            }
        }

        // Dispara ao carregar a página
        window.onload = gravarVotoPublico;
    </script>

</body>
</html>
