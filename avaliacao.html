<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso - Pesquisa de Sentimento</title>
    
    <link rel="stylesheet" href="style-agradecimento.css">

    <style>
        body {
            background-color: #1b1e27;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Evita rolagens indesejadas no celular */
        }
        
        /* 1. Animação de entrada suave da caixa toda (Fade In Up) */
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 2. Animação de pop do ícone */
        .success-check-icon {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.2s;
            opacity: 0;
            transform: scale(0);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 3. Efeito Glow Laranja (Totem Fixo) */
        .glow-pulse-orange {
            box-shadow: 0 0 15px rgba(255, 81, 0, 0.3);
            animation: pulseGlowOrange 2s infinite alternate;
            background-color: rgba(255, 81, 0, 0.1);
        }

        @keyframes pulseGlowOrange {
            from { box-shadow: 0 0 15px rgba(255, 81, 0, 0.2); }
            to { box-shadow: 0 0 35px rgba(255, 81, 0, 0.6); }
        }

        /* 4. Efeito Glow Amarelo (Totem Público Celular) */
        .glow-pulse-yellow {
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
            animation: pulseGlowYellow 2s infinite alternate;
            background-color: rgba(243, 156, 18, 0.1);
        }

        @keyframes pulseGlowYellow {
            from { box-shadow: 0 0 15px rgba(243, 156, 18, 0.2); }
            to { box-shadow: 0 0 35px rgba(243, 156, 18, 0.6); }
        }

        .btn-fechar {
            background: rgba(255, 255, 255, 0.05);
            color: #a0a5b0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
            margin-top: 15px;
            display: none; /* Escondido por padrão, aparece só no celular */
        }
        .btn-fechar:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>
<body>

    <div class="totem-app-canvas animate-fade-in-up" style="width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 70vh;">
      
      <div class="success-box">
        <div id="wrapperIcone" class="success-icon-wrapper glow-pulse-orange" style="width: 90px; height: 90px; margin: 0 auto 24px auto; border-radius: 50%; padding: 15px; display: flex; align-items: center; justify-content: center;">
          <svg viewBox="0 0 24 24" fill="none" id="svgCheck" stroke="rgb(255, 81, 0)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="success-check-icon" style="width: 100%; height: 100%;">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
        </div>
        
        <h2 id="textoTitulo" class="success-title" style="font-size: 26px; font-weight: 800; margin-bottom: 8px; color: white;">VOTO REGISTRADO!</h2>
        
        <h5 id="textoSubtitulo" style="color: #a0a5b0; font-family: Helvetica; font-size: 16px; font-weight: normal; margin-top: 0;">
          Sua voz molda o nosso futuro!
        </h5>
        
        <div id="caixaRodape" style="margin-top: 40px; padding: 12px 20px; border-radius: 12px; background-color: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);">
            <p id="textoStatus" style="color: rgba(255,255,255,0.5); font-size: 13px; margin: 0; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgb(255, 81, 0)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                Retornando à tela inicial...
            </p>
            <button id="btnFecharAbas" class="btn-fechar" onclick="window.close()">Fechar Página</button>
        </div>
      </div>

    </div>

    <script>
        const URL_BACKEND = "https://script.google.com/macros/s/AKfycbyJf8Gk7xyV4xD5H27__euX5_eYNMRRimBOF7UroXh7dVhHU7rh-EdX2pDZsq-fYWss/exec";

        // Captura os parâmetros enviados pela URL
        const urlParams = new URLSearchParams(window.location.search);
        const nomeEvento = urlParams.get('evento');
        const idEvento = urlParams.get('id');
        const sentimento = urlParams.get('sentimento');
        const setor = urlParams.get('setor') || "Geral";
        
        // 🚨 O PULO DO GATO: Se na URL vier o parâmetro "modo=publico", sabemos que é o celular!
        const ehModoPublico = window.location.href.includes('publico.html') || urlParams.get('modo') === 'publico' || document.referrer.includes('publico.html');

        // Trava do botão voltar para o celular (Anti-Fraude)
        window.history.replaceState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.go(1);
        };

        async function executarFluxoAgradecimento() {
            // 1. EXECUTA A LÓGICA VISUAL BASEADA NO MODO (FIXO VS CELULAR)
            if (ehModoPublico) {
                // Configura a tela com a cara do MODO PÚBLICO (Amarelo e Estático)
                document.getElementById('wrapperIcone').className = "success-icon-wrapper glow-pulse-yellow";
                document.getElementById('svgCheck').setAttribute('stroke', 'rgb(243, 156, 18)');
                document.getElementById('textoTitulo').innerText = "SENTIMENTO REGISTRADO!";
                document.getElementById('textoSubtitulo').innerHTML = "Muito obrigado por participar.<br>Sua voz molda o nosso futuro!";
                document.getElementById('textoStatus').parentElement.style.backgroundColor = "rgba(255,255,255,0.02)";
                document.getElementById('textoStatus').innerHTML = "Sua resposta foi salva de forma anônima e segura. Você já pode sair desta tela.";
                document.getElementById('btnFecharAbas').style.display = "inline-block"; // Mostra o botão fechar
                
                // Grava no histórico do celular para não deixar votar de novo se ele reabrir o link
                if (idEvento) {
                    localStorage.setItem('votou_' + idEvento, 'sim');
                }
            } else {
                // Fluxo normal do TOTEM FIXO: Ativa o timer de 2 segundos para voltar pro index.html
                setTimeout(function() {
                    window.location.href = "index.html"; 
                }, 2000); 
            }

            // 2. GRAVA O VOTO DE VERDADE NA PLANILHA
            if (!nomeEvento || !sentimento) return;

            let nota = 10;
            if (sentimento === 'Quero saber mais') nota = 8;
            if (sentimento === 'Poderia ser melhor') nota = 5;

            const payload = {
                evento: nomeEvento,
                sentimento: sentimento,
                nota: nota,
                setor: setor
            };

            try {
                await fetch(URL_BACKEND, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                console.log("Voto salvo na planilha.");
            } catch (e) {
                console.error("Voto processado.");
            }
        }

        window.onload = executarFluxoAgradecimento;
    </script>

</body>
</html>
