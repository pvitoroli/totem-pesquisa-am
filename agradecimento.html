<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso - Pesquisa de Sentimento</title>
    
    <link rel="stylesheet" href="style-agradecimento.css">

    <style>
        body {
            background-color: #1b1e27;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* 1. Animação de entrada suave de toda a caixa */
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 2. O Pedestal com Glow Laranja Pulsante */
        .hero-symbol-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 32px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: rgba(255, 81, 0, 0.05); /* Fundo sutil laranja */
            animation: pulseOrangeGlow 2.5s infinite alternate ease-in-out;
        }

        @keyframes pulseOrangeGlow {
            0% { 
                box-shadow: 0 0 20px rgba(255, 81, 0, 0.2), inset 0 0 15px rgba(255, 81, 0, 0.1); 
            }
            100% { 
                box-shadow: 0 0 50px rgba(255, 81, 0, 0.6), inset 0 0 30px rgba(255, 81, 0, 0.3); 
            }
        }

        /* 3. A Levitação Suave do Seu Símbolo */
        .hero-symbol {
            width: 75%;
            height: 75%;
            object-fit: contain;
            filter: drop-shadow(0px 15px 10px rgba(0,0,0,0.5)); /* Sombra realista 3D */
            animation: floatSymbol 4s ease-in-out infinite;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        @keyframes floatSymbol {
            0% { transform: translateY(0px); opacity: 1; }
            50% { transform: translateY(-12px); opacity: 1; }
            100% { transform: translateY(0px); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="totem-app-canvas animate-fade-in-up" style="width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 70vh;">
      
      <div class="success-box">
        
        <div class="hero-symbol-wrapper">
          <img src="simbolo-app.png" alt="Símbolo Pesquisa" class="hero-symbol">
        </div>
        
        <h2 class="success-title" style="font-size: 26px; font-weight: 800; margin-bottom: 8px; color: white;">VOTO REGISTRADO!</h2>
        
        <h5 style="color: #a0a5b0; font-family: Helvetica; font-size: 16px; font-weight: normal; margin-top: 0;">
          Sua voz molda o nosso futuro!
        </h5>
        
        <div style="margin-top: 40px; padding: 12px 20px; border-radius: 12px; background-color: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);">
            <p style="color: rgba(255, 255, 255, 0.5); font-size: 13px; margin: 0; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgb(255, 81, 0)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                Pode fechar esta página com segurança.
            </p>
        </div>
      </div>

    </div>

    <script>
        // UX Moderna: Impede que o usuário volte para a tela de avaliação pelo celular
        window.history.replaceState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.go(1);
        };
    </script>

</body>
</html>
