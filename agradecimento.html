<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado! - Pesquisa de Sentimento</title>
    
    <style>
        body {
            background-color: #1b1e27;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .container {
            background: #2a2f3a; 
            border: 1.5px solid rgba(255, 255, 255, 0.05); 
            border-radius: 20px; 
            padding: 40px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            max-width: 400px; 
            width: 100%;
            text-align: center;
        }

        .success-check-icon {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 🔥 GLOW AMARELO PARA A TELA PÚBLICA 🔥 */
        .glow-pulse-yellow {
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
            animation: pulseGlowYellow 2s infinite alternate;
            background-color: rgba(243, 156, 18, 0.1);
        }

        @keyframes pulseGlowYellow {
            from { box-shadow: 0 0 15px rgba(243, 156, 18, 0.2); }
            to { box-shadow: 0 0 35px rgba(243, 156, 18, 0.6); }
        }

        .btn-fechar {
            background: #f39c12; color: #1b1e27; border: none; padding: 15px 30px; border-radius: 10px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; width: 100%;
            margin-top: 30px; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glow-pulse-yellow" style="width: 90px; height: 90px; margin: 0 auto 24px auto; border-radius: 50%; padding: 15px; display: flex; align-items: center; justify-content: center;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#f39c12" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="success-check-icon" style="width: 100%; height: 100%;">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>
        
        <h2 style="color: white; font-size: 24px; margin-bottom: 10px;">Sentimento Registrado!</h2>
        <p style="color: #a0a5b0; font-size: 15px; line-height: 1.5;">Obrigado por participar. A sua opinião é fundamental para a ArcelorMittal. Pode fechar esta página.</p>
        
        <button class="btn-fechar" onclick="window.close()">Fechar Pesquisa</button>
    </div>

    <script>
        const URL_BACKEND = "https://script.google.com/macros/s/AKfycbzJOLquqH2vlrywz83CAV5hEHUqmGc-VDqacyqxZVWl9uGqpt4NabKcK4HpvpmCMAeT/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const nomeEvento = urlParams.get('evento');
        const idEvento = urlParams.get('id');
        const sentimento = urlParams.get('sentimento');
        const setor = urlParams.get('setor');

        // Impede que o usuário volte para a página anterior
        window.history.replaceState(null, null, window.location.href);

        async function registrarVoto() {
            if (!nomeEvento || !sentimento) return;

            // Marca o celular como "já votou" nesta campanha
            if (idEvento) localStorage.setItem('votou_' + idEvento, 'sim');

            const payload = {
                evento: nomeEvento,
                sentimento: sentimento,
                nota: (sentimento === 'Poderia ser melhor') ? 5 : 10,
                setor: setor
            };

            try {
                await fetch(URL_BACKEND, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
            } catch (e) {
                console.error("Erro ao registrar voto:", e);
            }
        }

        window.onload = registrarVoto;
    </script>
</body>
</html>
