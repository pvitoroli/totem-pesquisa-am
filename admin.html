<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Gestão - Sentimento AMP</title>
    <style>
        :root { --primary: #ff5100; --bg: #1b1e27; --card: #2a2f3a; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { width: 130px; }
        .card { background: var(--card); border-radius: 16px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .form-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #373e4d; color: white; }
        button { background: var(--primary); font-weight: bold; cursor: pointer; border: none; }
        .filters { margin-bottom: 15px; display: flex; gap: 10px; }
        .filter-btn { background: #373e4d; padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .filter-btn.active { background: var(--primary); }
        .table-wrap { max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #a0a5b0; font-size: 12px; padding: 10px; }
        td { padding: 12px; border-bottom: 1px solid #444; }
        .status-pill { padding: 4px 10px; border-radius: 10px; font-size: 10px; text-transform: uppercase; }
        .ativo { background: #1a4d1a; color: #4bb543; }
        .rascunho { background: #554411; color: #ffcc00; }
        .encerrado { background: #444; color: #ccc; }
        .btn-action { margin-right: 5px; padding: 5px 10px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="logo-arcelormittal.png" class="logo">
            <span class="brand-subtext">Painel de Gestão - Pro Edition</span>
        </header>

        <section class="card">
            <h2>Nova Campanha</h2>
            <div class="form-row">
                <input type="text" id="nomeEvento" placeholder="Nome da Ação">
                <select id="setorEvento"><option>RH</option><option>Manutenção</option><option>Segurança</option></select>
                <input type="date" id="dataEvento">
                <button onclick="criarEvento()">Salvar</button>
            </div>
        </section>

        <section class="card">
            <div class="filters">
                <span class="filter-btn active" onclick="filtrar('todos')">Todos</span>
                <span class="filter-btn" onclick="filtrar('ativo')">Ativos</span>
                <span class="filter-btn" onclick="filtrar('rascunho')">Rascunhos</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Campanha</th><th>Setor</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="listaEventos"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbxkV75w5Dg3zSg8aHxE-B5URe569hd_FYct2_xaxm2RKY6WdMB0Z7eKP2aUy4khmNA/exec";
        let dadosCampanhas = [];

        async function carregar() {
            const res = await fetch(url + "?acao=listar");
            dadosCampanhas = await res.json();
            renderizar(dadosCampanhas);
        }

        function renderizar(lista) {
            const tbody = document.getElementById('listaEventos');
            tbody.innerHTML = '';
            lista.forEach(ev => {
                tbody.innerHTML += `<tr>
                    <td>${ev.nome_campanha}</td><td>${ev.setor}</td>
                    <td><span class="status-pill ${ev.status}">${ev.status}</span></td>
                    <td>
                        <button class="btn-action" onclick="alterar('${ev.id}', 'ativo')">Ativar</button>
                        <button class="btn-action" onclick="alterar('${ev.id}', 'encerrado')">Finalizar</button>
                    </td>
                </tr>`;
            });
        }

        function filtrar(status) {
            if(status === 'todos') renderizar(dadosCampanhas);
            else renderizar(dadosCampanhas.filter(c => c.status === status));
        }

        async function criarEvento() {
            const nome = document.getElementById('nomeEvento').value;
            const setor = document.getElementById('setorEvento').value;
            const data = document.getElementById('dataEvento').value;
            await fetch(`${url}?acao=criar&nome=${nome}&setor=${setor}&dataInicio=${data}`);
            carregar();
        }

        async function alterar(id, status) {
            await fetch(`${url}?acao=alterarStatus&id=${id}&status=${status}`);
            carregar();
        }

        carregar();
    </script>
</body>
</html>
