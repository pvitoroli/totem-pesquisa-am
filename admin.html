<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão - Sentimento AMP</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            background-color: #1b1e27;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .admin-container {
            width: 100%;
            max-width: 800px;
        }

        /* Cabecalho Corporativo */
        .totem-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 16px;
            margin-bottom: 32px;
        }

        .brand-subtext {
            font-size: 12px; 
            color: rgb(160, 165, 176); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-weight: 700;
        }

        /* Estilo dos Cards Baseados no Totem */
        .card {
            background-color: #2a2f3a;
            border: 1.5px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 20px;
            color: white;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Formulário de Criação */
        .input-group {
            display: flex;
            gap: 16px;
        }

        input[type="text"] {
            flex: 1;
            background-color: rgba(0, 0, 0, 0.25);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #ff5100;
            box-shadow: 0 0 15px rgba(255, 81, 0, 0.15);
        }

        .btn-primary {
            background-color: #ff5100;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 28px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary:hover {
            box-shadow: 0 5px 15px rgba(255, 81, 0, 0.3);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        /* Tabela Profissional */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        th {
            color: #a0a5b0;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .nome-evento {
            font-weight: 700;
            color: white;
            letter-spacing: 0.3px;
        }

        /* Badges de Status parecidos com Jira/Trello */
        .status-badge {
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
        }

        .status-ativo { background-color: rgba(75, 181, 67, 0.15); color: #4bb543; border: 1px solid rgba(75, 181, 67, 0.3); }
        .status-rascunho { background-color: rgba(255, 204, 0, 0.15); color: #ffcc00; border: 1px solid rgba(255, 204, 0, 0.3); }
        .status-encerrado { background-color: rgba(160, 165, 176, 0.15); color: #a0a5b0; border: 1px solid rgba(160, 165, 176, 0.3); }
        
        /* Botões Secundários na Tabela */
        .btn-action {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: white;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="totem-header">
            <div class="company-logo-area">
                <img src="logo-arcelormittal.png" alt="Logo ArcelorMittal" style="filter: brightness(1.2); max-width: 130px; object-fit: contain;" />
            </div>
            <div class="header-right-text">
                <span class="brand-subtext">Painel de Gestão - AMP</span>
            </div>
        </div>

        <div class="card">
            <h2>Criar Nova Campanha</h2>
            <div class="input-group">
                <input type="text" id="nomeEvento" placeholder="Ex: Semana da Segurança, Pesquisa de Clima..." autocomplete="off">
                <button class="btn-primary" id="btnSalvar" onclick="criarEvento()">Salvar Evento</button>
            </div>
        </div>

        <div class="card">
            <h2>Gerenciamento de Eventos</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nome da Campanha</th>
                        <th>Status</th>
                        <th>Ações RÁPIDAS</th>
                    </tr>
                </thead>
                <tbody id="listaEventos">
                    <tr><td colspan="3" style="text-align: center; color: #a0a5b0;">Carregando eventos do servidor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
        <script>
    // 1. Carrega a biblioteca do Supabase primeiro
    const script = document.createElement('script');
    script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
    script.onload = iniciarApp; // Só roda o app quando carregar
    document.head.appendChild(script);

    function iniciarApp() {
        // === INSIRA SUAS CHAVES AQUI (MANTENHA AS ASPAS) ===
        const supabaseUrl = 'https://pesquisa-sentimento-am.supabase.co'; // Substitua pelo link real do seu projeto
        const supabaseKey = 'sb_publishable_pMWd7GViysXMxBhFxUEgNQ_Vn3IpU8-'; 
        
        // Inicializa o cliente corretamente
        window.db = supabase.createClient(supabaseUrl, supabaseKey);
        
        // Começa a carregar os dados
        carregarEventos();
    }

    // 2. Carregar lista de eventos do Banco de Dados
    async function carregarEventos() {
        if (!window.db) return;

        const { data, error } = await window.db
            .from('eventos')
            .select('*')
            .order('data_criacao', { ascending: false });
        
        if (error) {
            console.error("Erro ao carregar:", error);
            alert("Erro ao carregar: " + error.message);
            return;
        }

        const lista = document.getElementById('listaEventos');
        lista.innerHTML = '';
        
        if(!data || data.length === 0) {
            lista.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #a0a5b0;">Nenhuma campanha criada ainda.</td></tr>';
            return;
        }

        data.forEach(evento => {
            let badgeClass = evento.status === 'ativo' ? 'status-ativo' : (evento.status === 'rascunho' ? 'status-rascunho' : 'status-encerrado');
            let actionText = evento.status === 'ativo' ? 'Encerrar Ação' : 'Ativar no Totem';
            let nextStatus = evento.status === 'ativo' ? 'encerrado' : 'ativo';

            lista.innerHTML += `
                <tr>
                    <td class="nome-evento">${evento.nome_campanha}</td>
                    <td><span class="status-badge ${badgeClass}">${evento.status}</span></td>
                    <td>
                        <button class="btn-action" onclick="alterarStatus('${evento.id}', '${nextStatus}')">
                            ${actionText}
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    // 3. Criar Novo Evento
    async function criarEvento() {
        const nomeInput = document.getElementById('nomeEvento');
        const nome = nomeInput.value.trim();
        const btnSalvar = document.getElementById('btnSalvar');

        if (!nome) { alert('Digite um nome!'); return; }

        btnSalvar.innerText = "Salvando...";
        btnSalvar.disabled = true;

        const { error } = await window.db
            .from('eventos')
            .insert([{ nome_campanha: nome, status: 'rascunho' }]);

        if (error) {
            alert("Erro ao criar: " + error.message);
        } else {
            nomeInput.value = '';
            carregarEventos();
        }

        btnSalvar.innerText = "Salvar Evento";
        btnSalvar.disabled = false;
    }

    // 4. Alterar Status
    async function alterarStatus(id, novoStatus) {
        const { error } = await window.db
            .from('eventos')
            .update({ status: novoStatus })
            .eq('id', id);

        if (error) {
            alert("Erro ao atualizar: " + error.message);
        } else {
            carregarEventos();
        }
    }
</script>
