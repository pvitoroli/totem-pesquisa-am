<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestão Pro - ArcelorMittal</title>
    <style>
        :root {
            --bg: #12141a; --surface: #1e222d; --surface-hover: #2a2f3a;
            --primary: #ff5100; --primary-hover: #e04700;
            --text: #ffffff; --text-muted: #9aa0a6; --border: rgba(255,255,255,0.08);
            --status-ativo: #2ecc71; --status-espera: #f39c12; --status-encerrado: #95a5a6; --status-rascunho: #3498db;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        
        .container { max-width: 1000px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        
        .logo { max-width: 130px; max-height: 35px; width: 100%; object-fit: contain; }
        
        .card { background: var(--surface); border-radius: 16px; padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        h2 { font-size: 18px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 10px; font-size: 14px; outline: none; }
        input:focus, select:focus { border-color: var(--primary); }
        
        .btn { padding: 14px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; text-align: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); color: white; border-color: white; }

        .filters-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
        .filter-pill { background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .filter-pill.active { background: rgba(255,255,255,0.1); color: white; border-color: var(--text); }
        .filter-date { padding: 8px 12px; font-size: 12px; height: 35px; margin-left: auto; }

        .list-container { max-height: 450px; overflow-y: auto; padding-right: 5px; transition: max-height 0.4s ease; }
        .list-container.expanded { max-height: none; overflow: visible; }
        
        .list-item { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .item-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; gap: 15px; }
        .item-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .item-title { font-weight: 600; font-size: 15px; }
        .item-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge.ativo { background: rgba(46,204,113,0.15); color: var(--status-ativo); border: 1px solid rgba(46,204,113,0.3); }
        .badge.espera { background: rgba(243,156,18,0.15); color: var(--status-espera); border: 1px solid rgba(243,156,18,0.3); }
        .badge.encerrado { background: rgba(149,165,166,0.15); color: var(--status-encerrado); border: 1px solid rgba(149,165,166,0.3); }
        .badge.rascunho { background: rgba(52,152,219,0.15); color: var(--status-rascunho); border: 1px solid rgba(52,152,219,0.3); }

        .action-select { background: var(--surface); border: 1px solid var(--border); color: white; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }

        .sub-list { display: none; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
        .sub-list.open { display: block; }
        .sub-item { padding: 12px 16px 12px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); cursor: pointer; }
        .sub-item:last-child { border-bottom: none; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--surface); width: 90%; max-width: 500px; border-radius: 20px; padding: 30px; border: 1px solid var(--border); }
        .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; margin-bottom: 10px; }

        @media(max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .item-header { flex-direction: column; align-items: flex-start; }
            .filter-date { margin-left: 0; width: 100%; margin-top: 10px; }
            .modal-actions { grid-template-columns: 1fr; }
            .action-wrapper { width: 100%; justify-content: space-between; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="logo-arcelormittal.png" alt="ArcelorMittal" class="logo" onerror="this.style.display='none'">
            <span style="font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px;">PAINEL DE GESTÃO CORPORATIVO</span>
        </header>

        <section class="card">
            <h2>Lançar Nova Campanha</h2>
            <div class="form-grid">
                <input type="text" id="nomeCampanha" placeholder="Ex: Maio Amarelo Dia 1" autocomplete="off">
                <select id="setorCampanha">
                    <option value="" disabled selected>Selecione o Setor</option>
                    <option value="Comunicação">Comunicação</option>
                    <option value="RH">Recursos Humanos</option>
                    <option value="Manutenção">Manutenção</option>
                    <option value="Saúde e Segurança">Saúde e Segurança</option>
                    <option value="Operação">Operação</option>
                </select>
                <input type="date" id="dataCampanha">
                <button class="btn btn-primary" id="btnSalvar" onclick="salvarCampanha()">Gravar na Base</button>
            </div>
        </section>

        <section class="card">
            <h2>
                <span>Campanhas</span>
                <button class="btn-outline" style="padding: 6px 12px; font-size: 11px; border-radius: 8px;" onclick="toggleExpand()" id="btnExpand">Expandir Lista ▼</button>
            </h2>
            
            <div class="filters-bar">
                <div class="filter-pill active" onclick="aplicarFiltroStatus('todas', this)">Todas</div>
                <div class="filter-pill" onclick="aplicarFiltroStatus('ativo', this)">Ativas</div>
                <div class="filter-pill" onclick="aplicarFiltroStatus('espera', this)">Em Espera</div>
                <div class="filter-pill" onclick="aplicarFiltroStatus('rascunho', this)">Rascunhos</div>
                <div class="filter-pill" onclick="aplicarFiltroStatus('encerrado', this)">Finalizadas</div>
                
                <input type="date" class="filter-date" id="filtroData" onchange="renderizarLista()">
            </div>

            <div class="list-container" id="containerLista">
                <div id="renderArea" style="text-align: center; color: var(--text-muted); padding: 20px;">
                    Sincronizando com os servidores Google...
                </div>
            </div>
        </section>
    </div>

    <div class="modal-overlay" id="modalJornada" onclick="fecharModal(event)">
        <div class="modal">
            <h3 id="modTitle" style="margin-bottom: 10px;">Nome da Campanha</h3>
            <p id="modMeta" style="color: var(--text-muted); font-size: 13px;"></p>
            
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="iniciarTotem()">💻 Iniciar Modo Totem</button>
                <button class="btn btn-outline" onclick="gerarLink()">🔗 Copiar Link Direto</button>
            </div>
            <button class="btn btn-outline" style="width: 100%; border: none; margin-top: 10px;" onclick="document.getElementById('modalJornada').style.display='none'">Fechar Janela</button>
        </div>
    </div>

    <script>
        // AS SUAS URLS OFICIAIS
        const URL_BACKEND = "https://script.google.com/macros/s/AKfycbzq0bptZmMBNKqWfxBnpjL1euLHmNucldQnQsJeA9xwxHY-GgK0nSzKkuwH7LZfznQb/exec"; 
        const URL_SITE_BASE = "https://pesquisa-sentimento-amp.vercel.app/index.html"; 
        
        let dbCampanhas = [];
        let stateFiltroStatus = 'todas';
        let campSelecionada = null;

        window.onload = async () => {
            document.getElementById('dataCampanha').valueAsDate = new Date();
            await buscarDados();
        };

        async function buscarDados() {
            try {
                const antiCache = new Date().getTime();
                const res = await fetch(`${URL_BACKEND}?acao=listar&t=${antiCache}`);
                dbCampanhas = await res.json();
                renderizarLista();
            } catch (e) {
                document.getElementById('renderArea').innerHTML = "Falha ao ler dados da planilha.";
            }
        }

        async function salvarCampanha() {
            const nome = document.getElementById('nomeCampanha').value.trim();
            const setor = document.getElementById('setorCampanha').value;
            const data = document.getElementById('dataCampanha').value;
            const btn = document.getElementById('btnSalvar');

            if (!nome || !setor || !data) return alert("Por favor, preencha todos os campos!");

            if (dbCampanhas.some(c => c.nome_campanha.toLowerCase() === nome.toLowerCase())) {
                return alert("⚠️ Uma campanha com esse nome já existe na base de dados.");
            }

            btn.innerText = "Gravando..."; btn.disabled = true;

            try {
                const antiCache = new Date().getTime();
                const res = await fetch(`${URL_BACKEND}?acao=criar&nome=${encodeURIComponent(nome)}&setor=${encodeURIComponent(setor)}&dataInicio=${encodeURIComponent(data)}&t=${antiCache}`);
                const resposta = await res.json();
                if (!resposta.sucesso) alert(resposta.erro || "Erro desconhecido ao salvar.");
            } catch (e) {
                alert("Erro de conexão ao salvar.");
            }

            btn.innerText = "Gravar na Base"; btn.disabled = false;
            document.getElementById('nomeCampanha').value = '';
            buscarDados(); 
        }

        function agruparCampanhas(lista) {
            let grupos = {};
            lista.forEach(c => {
                let baseName = c.nome_campanha.replace(/\s*(?:-|–)?\s*(?:dia|turma|etapa|parte|fase)\s*[a-z0-9]+$/i, '').trim();
                if (!grupos[baseName]) grupos[baseName] = [];
                grupos[baseName].push(c);
            });
            return grupos;
        }

        function renderizarLista() {
            const area = document.getElementById('renderArea');
            const dataFiltro = document.getElementById('filtroData').value;
            
            let filtrados = dbCampanhas.filter(c => {
                let passaStatus = (stateFiltroStatus === 'todas' || c.status === stateFiltroStatus);
                let passaData = (!dataFiltro || c.data_inicio.substring(0,10) === dataFiltro);
                return passaStatus && passaData;
            });

            if (filtrados.length === 0) {
                area.innerHTML = "<p style='padding:20px;'>Nenhuma campanha atende aos filtros aplicados.</p>";
                return;
            }

            const grupos = agruparCampanhas(filtrados);
            area.innerHTML = '';

            for (let baseName in grupos) {
                const itens = grupos[baseName];
                if (itens.length === 1) {
                    area.innerHTML += criarCardHTML(itens[0]);
                } else {
                    let subHtml = itens.map(i => criarCardHTML(i, true)).join('');
                    area.innerHTML += `
                        <div class="list-item">
                            <div class="item-header" onclick="toggleSublist(this)">
                                <div class="item-info">
                                    <div class="item-title">📂 Coleção Agrupada: ${baseName}</div>
                                    <div class="item-meta">Contém ${itens.length} sub-campanhas cadastradas</div>
                                </div>
                                <span style="font-size:12px;">Expandir ▼</span>
                            </div>
                            <div class="sub-list">${subHtml}</div>
                        </div>
                    `;
                }
            }
        }

        function criarCardHTML(ev, isSub = false) {
            let dataFormatada = ev.data_inicio ? new Date(ev.data_inicio).toLocaleDateString('pt-BR') : 'Sem data';
            let divClass = isSub ? 'sub-item' : 'list-item';
            
            // O Menu agora tem um botão "Salvar" ao lado dele
            let menuStatus = `
                <div class="action-wrapper" style="display:flex; align-items:center; gap:8px;" onclick="event.stopPropagation()">
                    <select id="status-${ev.id}" class="action-select">
                        <option value="rascunho" ${ev.status==='rascunho'?'selected':''}>Rascunho</option>
                        <option value="ativo" ${ev.status==='ativo'?'selected':''}>🟢 Ativo</option>
                        <option value="espera" ${ev.status==='espera'?'selected':''}>🟡 Em Espera</option>
                        <option value="encerrado" ${ev.status==='encerrado'?'selected':''}>⚪ Encerrado</option>
                    </select>
                    <button class="btn" style="background: var(--primary); color: white; padding: 8px 12px; font-size: 11px;" onclick="alterarStatus('${ev.id}', document.getElementById('status-${ev.id}').value, this)">Salvar</button>
                </div>
            `;

            return `
                <div class="${divClass}" onclick="abrirModalJornada('${ev.id}')">
                    <div style="width:100%; display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 10px; padding: 14px 16px;">
                        <div class="item-info">
                            <div class="item-title">${ev.nome_campanha}</div>
                            <div class="item-meta">
                                <span>${ev.setor}</span>•<span>${dataFormatada}</span>
                                <span class="badge ${ev.status}">${ev.status}</span>
                            </div>
                        </div>
                        ${menuStatus}
                    </div>
                </div>
            `;
        }

        // 🔥 FUNÇÃO DE SALVAMENTO BLINDADA COM FEEDBACK 🔥
        async function alterarStatus(id, novoStatus, btnElement) {
            if(!id) return alert("Erro: Campanha sem ID válido.");
            
            // Dá feedback visual de que está trabalhando
            const textoOriginal = btnElement.innerText;
            btnElement.innerText = "⏳ Gravando...";
            btnElement.disabled = true;

            try {
                const antiCache = new Date().getTime();
                const url = `${URL_BACKEND}?acao=alterarStatus&id=${id}&status=${novoStatus}&t=${antiCache}`;
                
                const res = await fetch(url);
                const json = await res.json();

                if(json.sucesso !== false) {
                    // Atualiza a tela instantaneamente
                    let camp = dbCampanhas.find(c => c.id === id);
                    if(camp) camp.status = novoStatus;
                    renderizarLista();
                    alert("✅ Status atualizado com sucesso na planilha!");
                } else {
                    alert("⚠️ A planilha não conseguiu atualizar. Atualize a página e tente de novo.");
                }
            } catch (e) {
                console.error("Erro ao alterar status:", e);
                alert("❌ Erro de conexão ao tentar salvar.");
            } finally {
                // Devolve o botão ao estado normal
                btnElement.innerText = textoOriginal;
                btnElement.disabled = false;
            }
        }

        function toggleSublist(el) {
            el.nextElementSibling.classList.toggle('open');
            el.querySelector('span').innerText = el.nextElementSibling.classList.contains('open') ? 'Recolher ▲' : 'Expandir ▼';
        }

        function toggleExpand() {
            const cont = document.getElementById('containerLista');
            const btn = document.getElementById('btnExpand');
            cont.classList.toggle('expanded');
            btn.innerText = cont.classList.contains('expanded') ? 'Recolher Lista ▲' : 'Expandir Lista ▼';
        }

        function aplicarFiltroStatus(status, element) {
            stateFiltroStatus = status;
            document.querySelectorAll('.filter-pill').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            renderizarLista();
        }

        function abrirModalJornada(id) {
            campSelecionada = dbCampanhas.find(c => c.id === id);
            if(!campSelecionada) return;
            
            document.getElementById('modTitle').innerText = campSelecionada.nome_campanha;
            document.getElementById('modMeta').innerText = `Setor: ${campSelecionada.setor} | Status Atual: ${campSelecionada.status.toUpperCase()}`;
            document.getElementById('modalJornada').style.display = 'flex';
        }

        function fecharModal(e) {
            if(e.target.id === 'modalJornada') {
                document.getElementById('modalJornada').style.display = 'none';
            }
        }

        function pegarLinkCompleto() {
            return `${URL_SITE_BASE}?evento=${encodeURIComponent(campSelecionada.id)}&setor=${encodeURIComponent(campSelecionada.setor)}`;
        }

        function iniciarTotem() {
            window.open(pegarLinkCompleto(), '_blank');
        }

        function gerarLink() {
            navigator.clipboard.writeText(pegarLinkCompleto()).then(() => {
                alert("✅ Link parametrizado copiado com sucesso! Pronto para colar no gerador de QR Code.");
            });
        }
    </script>
</body>
</html>
